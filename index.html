<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WD Chest Predictor</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #07091a;
      --surface: #0e1030;
      --surface-2: #161840;
      --surface-3: #1e2050;
      --border: #2a2f60;
      --text: #dde4f8;
      --text-dim: #5a6080;
      --text-mid: #8890b0;
      --epic: #a855f7;
      --legendary: #f59e0b;
      --mythic: #3b82f6;
      --gold: #d4a017;
      --gold-bright: #f5c842;
      --gold-glow: rgba(212, 160, 23, 0.15);
      --plat: #8ab4f8;
      --plat-bright: #c0d8ff;
      --plat-glow: rgba(138, 180, 248, 0.15);
      --accent: var(--gold);
      --accent-bright: var(--gold-bright);
      --accent-glow: var(--gold-glow);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 16px 20px 60px;
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(212, 160, 23, 0.06) 0%, transparent 70%), radial-gradient(ellipse 60% 30% at 80% 110%, rgba(168, 85, 247, 0.04) 0%, transparent 60%)
    }

    .container {
      max-width: 860px;
      margin: 0 auto
    }

    .header {
      text-align: center;
      margin-bottom: 36px
    }

    .header h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a06800, #f5c842, #d4a017, #f5c842, #a06800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto
    }

    .plat-theme .header h1 {
      background: linear-gradient(135deg, #4a7adc, #c0d8ff, #8ab4f8, #c0d8ff, #4a7adc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto
    }

    .header .sub {
      color: var(--text-mid);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px
    }

    .tabs-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 8px
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      width: fit-content
    }

    .tab {
      padding: 9px 32px;
      border-radius: 11px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s
    }

    .tab:hover:not(.tab-active-gold):not(.tab-active-plat):not(.tab-active-config) {
      color: var(--text);
      background: var(--surface-2)
    }

    .tab-active-gold {
      background: linear-gradient(135deg, #221500, #3a2800);
      color: var(--gold-bright);
      box-shadow: 0 0 24px rgba(212, 160, 23, 0.25), inset 0 1px 0 rgba(245, 200, 66, 0.1)
    }

    .tab-active-plat {
      background: linear-gradient(135deg, #001535, #002255);
      color: var(--plat-bright);
      box-shadow: 0 0 24px rgba(138, 180, 248, 0.25), inset 0 1px 0 rgba(192, 216, 255, 0.1)
    }

    .tab-active-config {
      background: var(--surface-2);
      color: var(--text)
    }

    /* Platinum unconfirmed — hide Gold/Platinum switcher until ready */
    .tabs-chest {
      display: none
    }

    .weights-wrap {
      padding: 4px 0 16px
    }

    .weights-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px
    }

    .weight-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 6px;
      cursor: grab;
      transition: border-color 0.15s, background 0.15s, opacity 0.15s
    }

    .weight-item:hover {
      border-color: #404880
    }

    .weight-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow)
    }

    .weight-item.dragging {
      opacity: 0.35
    }

    .drag-handle {
      color: var(--text-dim);
      font-size: 18px;
      cursor: grab;
      flex-shrink: 0;
      user-select: none;
      line-height: 1
    }

    .weight-arrows {
      display: none;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0
    }

    .arrow-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-mid);
      font-size: 12px;
      cursor: pointer;
      padding: 3px 7px;
      line-height: 1.3;
      transition: all 0.15s
    }

    .arrow-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent-bright)
    }

    .arrow-btn:disabled {
      opacity: 0.25;
      cursor: default
    }

    @media (pointer: coarse) {
      .drag-handle {
        display: none
      }

      .weight-item {
        cursor: default
      }

      .weight-arrows {
        display: flex
      }
    }

    .inputs {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3)
    }

    .input-col {
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .input-group label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-mid)
    }

    .input-group input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button {
      -webkit-appearance: none
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow)
    }

    .input-group input::placeholder {
      color: var(--text-mid);
      font-weight: 400;
      font-size: 14px
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4)
    }

    .t-head {
      display: grid;
      grid-template-columns: 56px 1fr 1fr;
      background: var(--surface-3);
      border-bottom: 1px solid var(--border);
      padding: 10px 0
    }

    .t-head-cell {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .t-head-cell.main {
      color: var(--accent)
    }

    .t-head-cell.assault {
      color: color-mix(in srgb, var(--accent) 60%, var(--text-dim))
    }

    .t-head-cell.proposed {
      font-size: 22px;
      color: var(--accent-bright)
    }

    .t-divider {
      position: relative;
      height: 1px;
      background: var(--border);
      margin: 0
    }

    .t-divider::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      padding: 0 12px;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      font-weight: 700
    }

    .t-row {
      display: grid;
      grid-template-columns: 56px 1fr 1fr;
      border-bottom: 1px solid rgba(42, 47, 96, 0.4)
    }

    .t-row:last-child {
      border-bottom: none
    }

    .t-row.history {
      opacity: 0.45
    }

    .revert-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
      flex-shrink: 0
    }

    .revert-btn:hover {
      color: var(--accent-bright);
      background: var(--accent-glow)
    }


    .t-row.current {
      background: rgba(255, 255, 255, 0.018)
    }

    .t-row.bonus-row {
      background: rgba(245, 158, 11, 0.07);
      border-left: 2px solid rgba(245, 158, 11, 0.4)
    }

    .t-row.bonus-pending {
      background: rgba(245, 158, 11, 0.13);
      border-left: 2px solid rgba(245, 158, 11, 0.7)
    }

    .chest-num {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--text-dim);
      padding: 14px 0;
      border-right: 1px solid rgba(42, 47, 96, 0.4)
    }

    .t-row.current .chest-num {
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      font-size: 22px
    }

    .bonus-num {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--legendary);
      padding: 10px 0;
      border-right: 1px solid rgba(42, 47, 96, 0.4)
    }

    .e-cell {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      border-right: 1px solid rgba(42, 47, 96, 0.4)
    }

    .e-cell:last-child {
      border-right: none
    }

    .e-cell.better {
      background: var(--accent-glow);
      box-shadow: inset 0 0 10px 5px var(--accent-glow)
    }

    .badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0
    }

    .badge-epic {
      background: rgba(168, 85, 247, 0.12);
      color: var(--epic);
      border: 1px solid rgba(168, 85, 247, 0.25)
    }

    .badge-legendary {
      background: rgba(245, 158, 11, 0.12);
      color: var(--legendary);
      border: 1px solid rgba(245, 158, 11, 0.25)
    }

    .badge-mythic {
      background: rgba(59, 130, 246, 0.12);
      color: var(--mythic);
      border: 1px solid rgba(59, 130, 246, 0.25)
    }

    .item-info {
      flex: 1;
      min-width: 0;
      overflow: hidden
    }

    .item-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      text-overflow: ellipsis;
      margin-top: 3px;
      padding-bottom: 2px
    }

    .open-btn {
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-mid);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s
    }

    .open-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent-bright);
      box-shadow: 0 0 12px var(--accent-glow)
    }

    .empty {
      text-align: center;
      padding: 64px 24px
    }

    .empty .icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.4
    }

    .empty p {
      font-size: 13px;
      color: var(--text-mid);
      letter-spacing: 0.5px;
      line-height: 1.6
    }

    .plat-theme {
      --accent: var(--plat);
      --accent-bright: var(--plat-bright);
      --accent-glow: var(--plat-glow)
    }

    .view-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px
    }

    @media (max-width: 600px) {
      .view-btns {
        grid-template-columns: 1fr
      }
    }

    .util-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-mid);
      font-size: 12px;
      font-weight: 600;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%
    }

    .util-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent-bright);
      background: var(--accent-glow)
    }

    .util-btn:disabled {
      opacity: 0.3;
      cursor: default
    }

    .util-btn.danger:hover {
      border-color: rgba(255, 80, 80, 0.4);
      color: rgba(255, 120, 120, 0.8);
      background: transparent
    }

    .pos-bar {
      display: flex;
      gap: 8px;
      grid-column: 1/-1;
      margin-top: 4px
    }


    .inputs.view-mode input {
      display: none
    }

    .calib-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.4)
    }

    .calib-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px
    }

    .calib-sub {
      font-size: 16px;
      color: var(--text-mid);
      margin-bottom: 20px
    }

    .calib-event-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 16px
    }

    .calib-event-btn {
      flex: 1;
      padding: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s
    }

    .calib-event-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent-bright)
    }

    .calib-seq {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 32px
    }

    .calib-pick-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 12px
    }

    .calib-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 20px
    }


    .calib-items {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px
    }

    .calib-tier-break {
      grid-column: 1/-1;
      height: 0
    }

    @media (max-width: 600px) {
      .calib-items {
        grid-template-columns: 1fr
      }
    }

    .calib-item-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s
    }

    .calib-item-btn:hover {
      border-color: var(--accent);
      background: var(--accent-glow)
    }

    .calib-result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface-2);
      border-radius: 9px;
      border: 1px solid var(--border);
      margin-bottom: 8px
    }

    .calib-result-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      min-width: 150px
    }

    .calib-result-val {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent-bright)
    }


    .calib-confirm-btn {
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      border-radius: 11px;
      color: var(--accent-bright);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 14px 28px;
      cursor: pointer;
      transition: all 0.2s
    }

    .calib-confirm-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px var(--accent-glow)
    }

    .calib-confirm-btn:disabled {
      opacity: 0.35;
      cursor: default
    }

    .calib-continue-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text-mid);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 14px 24px;
      cursor: pointer;
      transition: all 0.2s
    }

    .calib-continue-btn:hover {
      border-color: var(--accent);
      color: var(--accent-bright);
      background: var(--accent-glow)
    }

    .calib-counter {
      display: flex;
      align-items: baseline;
      gap: 2px;
      margin-bottom: 16px
    }

    .calib-counter-num {
      font-size: 36px;
      font-weight: 800;
      color: var(--accent-bright);
      line-height: 1
    }

    .calib-counter-sep {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dim)
    }

    .calib-counter-batch {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-left: 8px;
      text-transform: uppercase
    }

    @media(max-width:600px) {
      body {
        padding: 16px 12px 40px
      }

      .btn-label {
        display: none
      }

      .inputs {
        grid-template-columns: 1fr;
        gap: 12px
      }

      .t-head,
      .t-row {
        grid-template-columns: 38px 1fr 1fr
      }

      .chest-num,
      .bonus-num {
        padding: 12px 0;
        font-size: 12px
      }

      .t-row.current .chest-num {
        font-size: 18px
      }

      .e-cell {
        padding: 10px
      }

      .item-name {
        font-size: 12px
      }

      .badge {
        font-size: 8px;
        padding: 2px 5px
      }

      .open-btn {
        padding: 5px 7px
      }
    }
  </style>
</head>

<body>
  <div class="container" id="root">
    <div class="header">
      <h1>Double Armory</h1>
      <div class="sub">Chest Predictor &middot; by Flirr</div>
    </div>
    <div class="tabs-row">
      <div class="tabs tabs-chest">
        <button class="tab" id="tab-gold" onclick="switchTab('gold')">Gold</button>
        <button class="tab" id="tab-plat" onclick="switchTab('plat')">Platinum</button>
      </div>
      <div class="tabs">
        <button class="tab" id="tab-config" onclick="switchTab('config')">⚙️ Config</button>
      </div>
    </div>
    <div id="inputs-section"></div>
    <div id="table-section"></div>
    <div id="config-section" style="display:none"></div>
  </div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const BONUS_PERIOD = 30;

    // ─── State ────────────────────────────────────────────────────────────────
    function mkCalib() {
      return {
        active: false, event: null, picks: [], batchStart: 0,
        mainCands: null, rarCands: { Epic: null, Legendary: null, Mythic: null },
        confirming: false, confirmData: null
      };
    }

    const S = {
      tab: 'gold',
      gold: { main: null, epic: null, leg: null, bonus: null, pendingBonus: false, hist: [], calib: mkCalib(), editing: false, editSnapshot: null },
      plat: { main: null, epic: null, leg: null, myth: null, bonus: null, pendingBonus: false, hist: [], calib: mkCalib(), editing: false, editSnapshot: null }
    };

    let DATA = {};
    let WEIGHTS_ARRAY = [];
    let WEIGHT_MAP = {};
    let ITEM_RARITY = {};
    let dataLoaded = false;

    // ─── Embedded Data ────────────────────────────────────────────────────────

    // ─── Weights ──────────────────────────────────────────────────────────────
    const DEFAULT_WEIGHTS_ARRAY = Object.keys(WEIGHTS_DATA).reverse(); // best-first

    function buildRarityMap() {
      const rarOrder = { Epic: 1, Legendary: 2, Mythic: 3 };
      for (const chest of [GOLD_DATA, PLAT_DATA]) {
        for (const ev of Object.values(chest)) {
          for (const [key, seq] of Object.entries(ev)) {
            if (!key.endsWith('_sequence') || key === 'main_sequence') continue;
            const rar = key.replace('_sequence', '');
            const rarCap = rar.charAt(0).toUpperCase() + rar.slice(1);
            for (const item of seq) {
              if (!ITEM_RARITY[item] || rarOrder[rarCap] > rarOrder[ITEM_RARITY[item]])
                ITEM_RARITY[item] = rarCap;
            }
          }
        }
      }
    }

    function buildWeightMap() {
      WEIGHT_MAP = {};
      const len = WEIGHTS_ARRAY.length;
      WEIGHTS_ARRAY.forEach((name, i) => { WEIGHT_MAP[name] = len - i; });
    }

    function initWeights() {
      try {
        const stored = JSON.parse(localStorage.getItem('wdcp2-weights') || 'null');
        if (Array.isArray(stored) && stored.length > 0) {
          WEIGHTS_ARRAY = stored;
          buildWeightMap();
          return;
        }
      } catch (e) { }
      WEIGHTS_ARRAY = [...DEFAULT_WEIGHTS_ARRAY];
      buildWeightMap();
    }

    function saveWeights() {
      try { localStorage.setItem('wdcp2-weights', JSON.stringify(WEIGHTS_ARRAY)); } catch (e) { }
    }

    function resetWeights() {
      WEIGHTS_ARRAY = [...DEFAULT_WEIGHTS_ARRAY];
      buildWeightMap();
      saveWeights();
      renderWeights();
    }

    let dragSrcIdx = null;

    function onWeightDragStart(e, idx) {
      dragSrcIdx = idx;
      e.dataTransfer.effectAllowed = 'move';
      e.currentTarget.classList.add('dragging');
    }

    function onWeightDragOver(e, idx) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.weight-item').forEach(el => el.classList.remove('drag-over'));
      e.currentTarget.classList.add('drag-over');
    }

    function onWeightDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function onWeightDrop(e, idx) {
      e.preventDefault();
      document.querySelectorAll('.weight-item').forEach(el => { el.classList.remove('drag-over'); el.classList.remove('dragging'); });
      if (dragSrcIdx === null || dragSrcIdx === idx) { dragSrcIdx = null; return; }
      const arr = [...WEIGHTS_ARRAY];
      const [item] = arr.splice(dragSrcIdx, 1);
      arr.splice(idx, 0, item);
      WEIGHTS_ARRAY = arr;
      buildWeightMap();
      saveWeights();
      renderWeights();
      dragSrcIdx = null;
    }

    function onWeightDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.weight-item').forEach(el => el.classList.remove('drag-over'));
      dragSrcIdx = null;
    }

    function weightMove(idx, dir) {
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= WEIGHTS_ARRAY.length) return;
      const arr = [...WEIGHTS_ARRAY];
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      WEIGHTS_ARRAY = arr;
      buildWeightMap();
      saveWeights();
      renderWeights();
    }

    function renderWeights() {
      const sec = document.getElementById('config-section');
      const last = WEIGHTS_ARRAY.length - 1;
      const rows = WEIGHTS_ARRAY.map((name, i) => {
        const rar = ITEM_RARITY[name] || 'Epic';
        const nm = name.length > 28 ? name.slice(0, 27) + '…' : name;
        return `<div class="weight-item" draggable="true" data-idx="${i}"
          ondragstart="onWeightDragStart(event,${i})"
          ondragover="onWeightDragOver(event,${i})"
          ondragleave="onWeightDragLeave(event)"
          ondrop="onWeightDrop(event,${i})"
          ondragend="onWeightDragEnd(event)">
          <span class="drag-handle">⠿</span>
          <div class="item-info">${badge(rar)}<div class="item-name">${nm}</div></div>
          <div class="weight-arrows">
            <button class="arrow-btn" onclick="weightMove(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button class="arrow-btn" onclick="weightMove(${i},1)" ${i === last ? 'disabled' : ''}>↓</button>
          </div>
        </div>`;
      }).join('');
      sec.innerHTML = `<div class="weights-wrap">
        <div class="weights-header">
          <button class="util-btn" style="width:auto;padding:6px 14px" onclick="switchTab('gold')">← Back</button>
          <button class="util-btn danger" style="width:auto;padding:6px 14px" onclick="resetWeights()">↺ Reset</button>
        </div>
        <div class="weight-list">${rows}</div>
      </div>`;
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    function init() {
      DATA = { gold: GOLD_DATA, plat: PLAT_DATA };
      buildRarityMap();
      initWeights();
      dataLoaded = true;
      loadState();
      switchTab(S.tab);
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function ts() { return S[S.tab]; }
    function isPlat() { return S.tab === 'plat'; }
    function theme() { return isPlat() ? 'plat-theme' : ''; }

    function seqLen(tab, event, rarity) {
      const seq = DATA[tab]?.[event]?.[rarity.toLowerCase() + '_sequence'];
      return seq ? seq.length : 0;
    }

    function maxLen(tab, rarity) {
      return Math.max(seqLen(tab, 'main_event', rarity), seqLen(tab, 'assault_event', rarity));
    }

    function getMainRarity(tab, event, mainPos) {
      const seq = DATA[tab][event].main_sequence;
      return seq[((mainPos - 1) % seq.length + seq.length) % seq.length];
    }

    function getTierItem(tab, event, rarity, pos) {
      const seq = DATA[tab][event]?.[rarity.toLowerCase() + '_sequence'];
      if (!seq || !seq.length) return null;
      return seq[((pos - 1) % seq.length + seq.length) % seq.length];
    }

    function getWeight(name) {
      return name ? (WEIGHT_MAP[name] || 0) : 0;
    }

    function eventDrop(tab, event, main, epic, leg, myth) {
      const rarity = getMainRarity(tab, event, main);
      const pos = rarity === 'Epic' ? epic : rarity === 'Legendary' ? leg : (myth || 1);
      const item = getTierItem(tab, event, rarity, pos);
      return { rarity, item, weight: getWeight(item) };
    }

    function isReady(s) {
      return dataLoaded && s.main && s.epic && s.leg && (!isPlat() || s.myth);
    }

    // ─── Lookahead ────────────────────────────────────────────────────────────
    function lookahead(n) {
      const s = ts(), tab = S.tab;
      if (!isReady(s)) return [];

      let { main, epic, leg } = s;
      let myth = s.myth || 1;
      let bonus = s.bonus;   // null = unknown, skip bonus logic
      const mythLen = maxLen(tab, 'Mythic') || 1;
      const rows = [];

      function seqLenFor(event, rarity) {
        const seq = DATA[tab][event]?.[rarity.toLowerCase() + '_sequence'];
        return seq?.length || 1;
      }

      // If a bonus chest is pending, show it first with Open buttons
      if (s.pendingBonus) {
        const bMain = getTierItem(tab, 'main_event', 'Legendary', leg);
        const bAssault = getTierItem(tab, 'assault_event', 'Legendary', leg);
        rows.push({
          isBonus: true, isPending: true,
          main: { rarity: 'Legendary', item: bMain, weight: getWeight(bMain) },
          assault: { rarity: 'Legendary', item: bAssault, weight: getWeight(bAssault) }
        });
        const bSimEvent = getWeight(bMain) >= getWeight(bAssault) ? 'main_event' : 'assault_event';
        leg = (leg % seqLenFor(bSimEvent, 'Legendary')) + 1;
        bonus = 0;
      }

      for (let i = 0; i < n; i++) {
        const mainDrop = eventDrop(tab, 'main_event', main, epic, leg, myth);
        const assaultDrop = eventDrop(tab, 'assault_event', main, epic, leg, myth);
        const bonusFires = bonus !== null && bonus === BONUS_PERIOD - 1;

        rows.push({ chestNum: main, isBonus: false, main: mainDrop, assault: assaultDrop, bonusFires });

        // Simulate advance: pick the better event by weight
        const simEvent = mainDrop.weight >= assaultDrop.weight ? 'main_event' : 'assault_event';
        const simRarity = simEvent === 'main_event' ? mainDrop.rarity : assaultDrop.rarity;

        // Advance regular tier counter using the chosen event's sequence length
        if (simRarity === 'Epic') epic = (epic % seqLenFor(simEvent, 'Epic')) + 1;
        else if (simRarity === 'Legendary') leg = (leg % seqLenFor(simEvent, 'Legendary')) + 1;
        else if (simRarity === 'Mythic') myth = (myth % mythLen) + 1;

        if (bonusFires) {
          // Bonus is a separate chest: draws at post-regular-advance leg position
          const bMain = getTierItem(tab, 'main_event', 'Legendary', leg);
          const bAssault = getTierItem(tab, 'assault_event', 'Legendary', leg);
          const bSimEvent = getWeight(bMain) >= getWeight(bAssault) ? 'main_event' : 'assault_event';
          rows.push({
            isBonus: true, isPending: false,
            main: { rarity: 'Legendary', item: bMain, weight: getWeight(bMain) },
            assault: { rarity: 'Legendary', item: bAssault, weight: getWeight(bAssault) }
          });
          leg = (leg % seqLenFor(bSimEvent, 'Legendary')) + 1;
          bonus = 0;
        } else if (bonus !== null) {
          bonus++;
        }

        main = (main % 100) + 1;
      }

      return rows;
    }

    // ─── Open Chest ───────────────────────────────────────────────────────────
    function openChest(chosenEvent) {
      const s = ts(), tab = S.tab;
      if (!isReady(s)) return;

      const { main, epic, leg } = s;
      const myth = s.myth || 1;
      const bonus = s.bonus;
      const mythLen = maxLen(tab, 'Mythic') || 1;

      const mainDrop = eventDrop(tab, 'main_event', main, epic, leg, myth);
      const assaultDrop = eventDrop(tab, 'assault_event', main, epic, leg, myth);
      const chosen = chosenEvent === 'main_event' ? mainDrop : assaultDrop;

      // Use the chosen event's sequence length for wrapping, matching XLS behaviour
      const cData = DATA[tab][chosenEvent];
      const cEpicLen = cData.epic_sequence.length;
      const cLegLen = cData.legendary_sequence.length;
      const cMythLen = (cData.mythic_sequence || []).length || mythLen;

      let newEpic = epic, newLeg = leg, newMyth = myth;
      if (chosen.rarity === 'Epic') newEpic = (epic % cEpicLen) + 1;
      else if (chosen.rarity === 'Legendary') newLeg = (leg % cLegLen) + 1;
      else if (chosen.rarity === 'Mythic') newMyth = (myth % cMythLen) + 1;

      // If bonus fires, defer it — user picks which event to open bonus from
      let newBonus = bonus !== null ? bonus + 1 : null;
      if (bonus !== null && bonus + 1 >= BONUS_PERIOD) {
        newBonus = BONUS_PERIOD - 1; // stays at 29 until bonus is resolved
        s.pendingBonus = true;
      }

      // Push to history
      const snapshot = { main: s.main, epic: s.epic, leg: s.leg, myth: s.myth, bonus: s.bonus, pendingBonus: s.pendingBonus };
      const histRow = { chestNum: main, main: mainDrop, assault: assaultDrop, chosen: chosenEvent, snapshot };
      s.hist.push(histRow);
      if (s.hist.length > 5) s.hist.shift();

      // Update state
      s.main = (main % 100) + 1;
      s.epic = newEpic;
      s.leg = newLeg;
      s.myth = newMyth;
      s.bonus = newBonus;

      const ev = chosenEvent === 'main_event' ? 'Main' : 'Assault';
      console.log(`[chest] ${ev} / ${chosen.rarity} / ${chosen.item} | main=${s.main} bonus=${s.bonus}${s.pendingBonus ? ' (bonus pending)' : ''} epic=${s.epic} leg=${s.leg}${isPlat() ? ` myth=${s.myth}` : ''}`);

      updateInputFields();
      saveState();
      renderTable();
    }

    function openBonus(chosenEvent) {
      const s = ts(), tab = S.tab;
      if (!s.pendingBonus) return;
      const legLen = DATA[tab][chosenEvent].legendary_sequence.length;
      const bonusItem = getTierItem(tab, chosenEvent, 'Legendary', s.leg);
      s.leg = (s.leg % legLen) + 1;
      s.bonus = 0;
      s.pendingBonus = false;

      const ev = chosenEvent === 'main_event' ? 'Main' : 'Assault';
      console.log(`[bonus] ${ev} / Legendary / ${bonusItem} | main=${s.main} bonus=${s.bonus} epic=${s.epic} leg=${s.leg}${isPlat() ? ` myth=${s.myth}` : ''}`);

      updateInputFields();
      saveState();
      renderTable();
    }

    function revertLast() {
      const s = ts();
      if (!s.hist.length) return;
      const { snapshot } = s.hist.pop();
      Object.assign(s, snapshot);
      updateInputFields();
      saveState();
      renderTable();
    }

    // ─── Rendering ────────────────────────────────────────────────────────────
    function badge(r) {
      return `<span class="badge badge-${r.toLowerCase()}">${r}</span>`;
    }

    function cellHtml(drop, showBtn, evKey, action = 'openChest', underline = false) {
      if (!drop || !drop.item) return '';
      const nm = drop.item.length > 28 ? drop.item.slice(0, 27) + '…' : drop.item;
      const btn = showBtn
        ? `<button class="open-btn" onclick="${action}('${evKey}')">✨ <span class="btn-label">Open</span></button>`
        : '';
      const nameStyle = underline ? ' style="text-decoration:underline;text-underline-offset:3px"' : '';
      return `<div class="item-info">${badge(drop.rarity)}<div class="item-name"${nameStyle}>${nm}</div></div>${btn}`;
    }

    function rowHtml(row, type) {
      const isPendingBonus = row.isBonus && row.isPending;
      const cls = [
        't-row',
        row.isBonus ? 'bonus-row' : '',
        isPendingBonus ? 'bonus-pending' : '',
        type === 'history' ? 'history' : '',
        type === 'current' ? 'current' : ''
      ].filter(Boolean).join(' ');

      const showBtn = type === 'current' && (!row.isBonus || isPendingBonus);
      const action = isPendingBonus ? 'openBonus' : 'openChest';
      const mw = row.main?.weight || 0;
      const aw = row.assault?.weight || 0;
      const mc = (!row.isBonus || isPendingBonus) && mw > aw ? 'better' : '';
      const ac = (!row.isBonus || isPendingBonus) && aw > mw ? 'better' : '';

      const numCell = row.isBonus
        ? `<div class="bonus-num">★</div>`
        : `<div class="chest-num">${row.chestNum}</div>`;

      return `<div class="${cls}">${numCell}<div class="e-cell ${ac}">${cellHtml(row.assault, showBtn, 'assault_event', action)}</div><div class="e-cell ${mc}">${cellHtml(row.main, showBtn, 'main_event', action)}</div></div>`;
    }

    function renderTable() {
      if (ts().calib?.active) { renderCalib(); return; }

      const th = theme();

      if (!isReady(ts())) {
        const head = `<div class="t-head"><div class="t-head-cell">#</div><div class="t-head-cell assault">Assault</div><div class="t-head-cell main">Breeding</div></div>`;
        document.getElementById('table-section').innerHTML =
          `<div class="table-wrap ${th}">${head}<div class="empty"><div class="icon">&#9876;</div><p>Enter your current positions above<br>to see predictions</p></div></div>`;
        return;
      }

      const rows = lookahead(20);
      const cur = rows[0];
      const assaultBetter = cur && !cur.isBonus && (cur.assault?.weight || 0) > (cur.main?.weight || 0);
      const mainBetter = cur && !cur.isBonus && (cur.main?.weight || 0) > (cur.assault?.weight || 0);
      const aClass = 'assault' + (assaultBetter ? ' proposed' : '');
      const mClass = 'main' + (mainBetter ? ' proposed' : '');
      const head = `<div class="t-head"><div class="t-head-cell">#</div><div class="t-head-cell ${aClass}">Assault</div><div class="t-head-cell ${mClass}">Breeding</div></div>`;

      const histArr = ts().hist;
      const hist = histArr.map((r, i) => histRowHtml(r, i === histArr.length - 1)).join('');
      const divider = ts().hist.length ? '<div class="t-divider"></div>' : '';
      const future = rows.length
        ? rowHtml(rows[0], 'current') + rows.slice(1).map(r => rowHtml(r, 'lookahead')).join('')
        : '';

      document.getElementById('table-section').innerHTML =
        `<div class="table-wrap ${th}">${head}${hist}${divider}${future}</div>`;
    }

    function histRowHtml(row, isLatest) {
      const btn = isLatest ? `<button class="revert-btn" onclick="revertLast()">↩</button>` : '';
      const assaultExtra = (isLatest && row.chosen === 'assault_event') ? btn : '';
      const mainExtra = (isLatest && row.chosen === 'main_event') ? btn : '';
      return `<div class="t-row history"><div class="chest-num">${row.chestNum}</div><div class="e-cell">${cellHtml(row.assault, false, '', 'openChest', row.chosen === 'assault_event')}${assaultExtra}</div><div class="e-cell">${cellHtml(row.main, false, '', 'openChest', row.chosen === 'main_event')}${mainExtra}</div></div>`;
    }

    // ─── Inputs ───────────────────────────────────────────────────────────────
    function renderInputs() {
      const s = ts(), tab = S.tab, th = theme();
      if (!dataLoaded) return;
      const focusedId = document.activeElement?.id;

      const mE = maxLen(tab, 'Epic');
      const mL = maxLen(tab, 'Legendary');
      const mM = maxLen(tab, 'Mythic');
      const ed = s.editing;
      const ro = ed ? '' : ' readonly';
      const ev = ed ? (f, mn, mx) => `oninput="onInp('${f}',this.value,${mn},${mx})"` : () => '';

      const bonusHint = s.bonus === null ? '' : ` — fires in ${BONUS_PERIOD - s.bonus} chest${BONUS_PERIOD - s.bonus === 1 ? '' : 's'}`;

      let content;
      if (ed) {
        const mythInp = isPlat() ? `
          <div class="input-group">
            <label>Mythic Position [1–${mM}]</label>
            <input type="number" id="i-myth" min="1" max="${mM}" value="${s.myth || ''}" placeholder="1–${mM}" ${ev('myth', 1, mM)}>
          </div>` : '';
        content = `
          <div class="input-col">
            <div class="input-group">
              <label>Main Position [1–100]</label>
              <input type="number" id="i-main" min="1" max="100" value="${s.main || ''}" placeholder="1–100" ${ev('main', 1, 100)}>
            </div>
            <div class="input-group">
              <label>Bonus [0–29] <span style="font-size:8px;color:var(--text-dim);letter-spacing:0">MANUAL${bonusHint}</span></label>
              <input type="number" id="i-bonus" min="0" max="29" value="${s.bonus !== null ? s.bonus : ''}" placeholder="0–29" ${ev('bonus', 0, 29)}>
            </div>
          </div>
          <div class="input-col">
            <div class="input-group">
              <label>Epic Position [1–${mE}]</label>
              <input type="number" id="i-epic" min="1" max="${mE}" value="${s.epic || ''}" placeholder="1–${mE}" ${ev('epic', 1, mE)}>
            </div>
            <div class="input-group">
              <label>Legendary Position [1–${mL}]</label>
              <input type="number" id="i-leg" min="1" max="${mL}" value="${s.leg || ''}" placeholder="1–${mL}" ${ev('leg', 1, mL)}>
            </div>
            ${mythInp}
          </div>
          <div class="pos-bar">
            <button class="util-btn danger" onclick="cancelEdit()">✕ Cancel</button>
            <button class="util-btn" onclick="confirmEdit()">✓ Confirm</button>
          </div>`;
      } else {
        const lbl = (t) => `<div style="font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-mid);margin-bottom:4px">${t}</div>`;
        const big = (v, den) => v !== null ? `<span style="font-size:32px;font-weight:800;color:var(--text)">${v}</span><span style="font-size:22px;font-weight:600;color:var(--text-dim)">${den}</span>` : `<span style="color:var(--text-dim);font-size:24px">—</span>`;
        const sm = (v) => v !== null ? `<span style="font-size:20px;font-weight:800;color:var(--text)">${v}</span>` : `<span style="color:var(--text-dim);font-size:16px">—</span>`;
        const tierItems = [['Epic', s.epic], ['Leg', s.leg], ...(isPlat() ? [['Myth', s.myth]] : [])];
        const tierHtml = tierItems.map(([t, v]) => `<div>${lbl(t)}${sm(v)}</div>`).join('');
        content = `
          <div style="display:flex;gap:24px;grid-column:1/-1;align-items:flex-end;padding-bottom:4px">
            <div>${lbl('Bonus')}${big(s.bonus, '/30')}</div>
            <div>${lbl('Main')}${big(s.main, '')}</div>
            <div style="display:flex;gap:16px;align-items:flex-end;margin-left:8px;padding-bottom:4px">${tierHtml}</div>
          </div>
          ${s.calib?.active ? '' : `<div class="view-btns" style="grid-column:1/-1"><button class="util-btn" onclick="showCalib()">🔍 Find positions</button><button class="util-btn" onclick="startEdit()">✏️ Edit positions</button></div>`}`;
      }

      document.getElementById('inputs-section').innerHTML = `<div class="inputs ${th}">${content}</div>`;
      if (focusedId) document.getElementById(focusedId)?.focus();
    }

    function onInp(field, val, min, max) {
      const n = parseInt(val);
      ts()[field] = (!isNaN(n) && n >= min && n <= max) ? n : null;
      if (!ts().editing) saveState();
      renderInputs();
      renderTable();
    }

    function startEdit() {
      const s = ts();
      s.editSnapshot = { main: s.main, epic: s.epic, leg: s.leg, bonus: s.bonus, myth: s.myth };
      s.editing = true;
      renderInputs();
      document.getElementById('i-main')?.focus();
    }

    function confirmEdit() {
      const s = ts();
      s.editSnapshot = null;
      s.editing = false;
      console.log(`[edit] main=${s.main} bonus=${s.bonus} epic=${s.epic} leg=${s.leg}${isPlat() ? ` myth=${s.myth}` : ''}`);
      saveState();
      renderInputs();
      renderTable();
    }

    function cancelEdit() {
      const s = ts();
      if (s.editSnapshot) {
        Object.assign(s, s.editSnapshot);
        s.editSnapshot = null;
      }
      s.editing = false;
      renderInputs();
      renderTable();
    }

    function updateInputFields() {
      const s = ts();
      [['main', 'i-main'], ['epic', 'i-epic'], ['leg', 'i-leg'], ['bonus', 'i-bonus'], ['myth', 'i-myth']].forEach(([k, id]) => {
        const el = document.getElementById(id);
        if (el && s[k] !== null && s[k] !== undefined) el.value = s[k];
      });
      renderInputs(); // refresh bonus hint
    }

    // ─── Tab / Mode ───────────────────────────────────────────────────────────
    function switchTab(t) {
      if (S.tab !== 'config' && ts().editing) cancelEdit();
      S.tab = t;
      document.getElementById('tab-gold').className = 'tab' + (t === 'gold' ? ' tab-active-gold' : '');
      document.getElementById('tab-plat').className = 'tab' + (t === 'plat' ? ' tab-active-plat' : '');
      document.getElementById('tab-config').className = 'tab' + (t === 'config' ? ' tab-active-config' : '');
      document.getElementById('root').className = 'container ' + (t === 'plat' ? 'plat-theme' : '');
      const isW = t === 'config';
      document.getElementById('inputs-section').style.display = isW ? 'none' : '';
      document.getElementById('table-section').style.display = isW ? 'none' : '';
      document.getElementById('config-section').style.display = isW ? '' : 'none';
      if (isW) {
        renderWeights();
      } else {
        saveState();
        renderInputs();
        renderTable();
      }
    }

    // ─── Persistence ──────────────────────────────────────────────────────────
    function saveState() {
      try {
        localStorage.setItem('wdcp2', JSON.stringify({
          tab: S.tab,
          gold: { main: S.gold.main, epic: S.gold.epic, leg: S.gold.leg, bonus: S.gold.bonus, pendingBonus: S.gold.pendingBonus },
          plat: { main: S.plat.main, epic: S.plat.epic, leg: S.plat.leg, myth: S.plat.myth, bonus: S.plat.bonus, pendingBonus: S.plat.pendingBonus }
        }));
      } catch (e) { }
    }

    function loadState() {
      try {
        const d = JSON.parse(localStorage.getItem('wdcp2') || 'null');
        if (!d) return;
        if (d.tab) S.tab = d.tab;
        if (d.gold) Object.assign(S.gold, d.gold);
        if (d.plat) Object.assign(S.plat, d.plat);
      } catch (e) { }
    }

    // ─── Calibration ──────────────────────────────────────────────────────────
    function showCalib() { ts().calib = mkCalib(); ts().calib.active = true; renderInputs(); renderTable(); }
    function hideCalib() { ts().calib = mkCalib(); renderInputs(); renderTable(); }

    function calibSetEvent(ev) {
      Object.assign(ts().calib, { event: ev, picks: [], batchStart: 0, mainCands: null, rarCands: { Epic: null, Legendary: null, Mythic: null } });
      renderCalib();
    }

    function computeMainCands(event, picks) {
      const mseq = DATA[S.tab][event].main_sequence;
      const cands = [];
      for (let p = 1; p <= 100; p++) {
        let ok = true;
        for (let j = 0; j < picks.length; j++) {
          if (mseq[(p - 1 + j) % 100] !== picks[j].rarity) { ok = false; break; }
        }
        if (ok) cands.push(p);
      }
      return cands;
    }

    function computeRarCands(event, picks, rarity) {
      const seq = DATA[S.tab][event]?.[rarity.toLowerCase() + '_sequence'];
      if (!seq?.length) return [];
      const rarPicks = picks.filter(p => p.rarity === rarity);
      if (!rarPicks.length) return null;
      const cands = [];
      for (let p = 1; p <= seq.length; p++) {
        let ok = true;
        for (let j = 0; j < rarPicks.length; j++) {
          if (seq[(p - 1 + j) % seq.length] !== rarPicks[j].itemName) { ok = false; break; }
        }
        if (ok) cands.push(p);
      }
      return cands;
    }

    function getPossibleItems(event, picks, mainCands, rarCands) {
      const d = DATA[S.tab];
      const mseq = d[event].main_sequence;
      const seen = new Set(), items = [];
      const mcs = mainCands || Array.from({ length: 100 }, (_, i) => i + 1);

      for (const p of mcs) {
        const rar = mseq[(p - 1 + picks.length) % 100];
        const seq = d[event]?.[rar.toLowerCase() + '_sequence'];
        if (!seq) continue;
        const rarCount = picks.filter(x => x.rarity === rar).length;
        const scs = rarCands[rar] || Array.from({ length: seq.length }, (_, i) => i + 1);
        for (const sc of scs) {
          const itemName = seq[(sc - 1 + rarCount) % seq.length];
          const key = rar + '|' + itemName;
          if (!seen.has(key)) { seen.add(key); items.push({ itemName, rarity: rar }); }
        }
      }
      return items.sort((a, b) => a.itemName.localeCompare(b.itemName));
    }

    function calibPickItem(itemName, rarity) {
      const c = ts().calib;
      c.picks.push({ itemName, rarity });
      c.mainCands = computeMainCands(c.event, c.picks);
      c.rarCands.Epic = computeRarCands(c.event, c.picks, 'Epic');
      c.rarCands.Legendary = computeRarCands(c.event, c.picks, 'Legendary');
      if (isPlat()) c.rarCands.Mythic = computeRarCands(c.event, c.picks, 'Mythic');

      if (c.picks.length - c.batchStart >= 10) {
        c.confirming = true;
        const sb = ts().bonus;
        c.confirmData = {
          epicSel: c.rarCands.Epic?.length === 1 ? c.rarCands.Epic[0] : null,
          legSel: c.rarCands.Legendary?.length === 1 ? c.rarCands.Legendary[0] : null,
          mythSel: c.rarCands.Mythic?.length === 1 ? c.rarCands.Mythic[0] : null,
          bonusSel: sb !== null ? (sb + 10) % 30 : null,
          bonusChest: false
        };
      }
      renderCalib();
    }

    function calibUndo() {
      const c = ts().calib;
      if (c.picks.length <= c.batchStart) return;
      c.picks.pop();
      c.confirming = false; c.confirmData = null;
      c.mainCands = c.picks.length ? computeMainCands(c.event, c.picks) : null;
      c.rarCands.Epic = computeRarCands(c.event, c.picks, 'Epic');
      c.rarCands.Legendary = computeRarCands(c.event, c.picks, 'Legendary');
      if (isPlat()) c.rarCands.Mythic = computeRarCands(c.event, c.picks, 'Mythic');
      renderCalib();
    }

    function calibContinue() {
      const c = ts().calib;
      c.confirming = false; c.confirmData = null;
      c.batchStart = c.picks.length;
      renderCalib();
    }

    function selectConfirmCand(field, val) {
      if (ts().calib.confirmData) ts().calib.confirmData[field] = val;
      renderCalib();
    }

    function toggleBonusChest(checked) {
      if (ts().calib.confirmData) ts().calib.confirmData.bonusChest = checked;
      renderCalib();
    }

    function calibConfirm() {
      const c = ts().calib;
      if (c.mainCands?.length !== 1) return;
      const cd = c.confirmData;
      const b = cd?.bonusSel;
      if (b === null || b === undefined || isNaN(b) || b < 0 || b > 29) return;
      const s = ts(), picks = c.picks;
      const epicCount = picks.filter(p => p.rarity === 'Epic').length;
      const legCount = picks.filter(p => p.rarity === 'Legendary').length + (cd.bonusChest ? 1 : 0);
      const mythCount = picks.filter(p => p.rarity === 'Mythic').length;
      const eStart = cd?.epicSel ?? (c.rarCands.Epic?.length === 1 ? c.rarCands.Epic[0] : null);
      const lStart = cd?.legSel ?? (c.rarCands.Legendary?.length === 1 ? c.rarCands.Legendary[0] : null);
      const mStart = cd?.mythSel ?? (c.rarCands.Mythic?.length === 1 ? c.rarCands.Mythic[0] : null);

      s.main = ((c.mainCands[0] - 1 + picks.length) % 100) + 1;
      if (eStart) s.epic = ((eStart - 1 + epicCount) % maxLen(S.tab, 'Epic')) + 1;
      if (lStart) s.leg = ((lStart - 1 + legCount) % maxLen(S.tab, 'Legendary')) + 1;
      if (isPlat() && mStart) s.myth = ((mStart - 1 + mythCount) % maxLen(S.tab, 'Mythic')) + 1;
      s.bonus = b;

      console.log(`[calib] main=${s.main} bonus=${s.bonus} epic=${s.epic} leg=${s.leg}${isPlat() ? ` myth=${s.myth}` : ''}${cd.bonusChest ? ' (+bonus chest)' : ''}`);
      hideCalib();
      saveState();
    }

    function renderCalib() {
      const c = ts().calib, th = theme();

      if (!c.event) {
        document.getElementById('table-section').innerHTML = `
        <div class="calib-wrap ${th}">
          <div class="calib-title">Find Position</div>
          <div class="calib-sub">Which event are you opening chests from?</div>
          <div class="calib-event-btns">
            <button class="calib-event-btn" onclick="calibSetEvent('assault_event')">⚔️ Assault</button>
            <button class="calib-event-btn" onclick="calibSetEvent('main_event')">🥚 Breeding</button>
          </div>
          <button class="util-btn danger" onclick="hideCalib()">✕ Cancel</button>
        </div>`;
        return;
      }

      if (c.confirming && c.confirmData) { renderCalibResults(); return; }

      const batchPicks = c.picks.slice(c.batchStart);
      const batchNum = Math.floor(c.batchStart / 10) + 1;
      const seqHtml = batchPicks.map(p => `<div class="calib-pick-tag">${badge(p.rarity)}<span>${p.itemName}</span></div>`).join('');
      const counter = `<div class="calib-counter"><span class="calib-counter-num">${batchPicks.length}</span><span class="calib-counter-sep"> / 10</span>${batchNum > 1 ? `<span class="calib-counter-batch">Batch ${batchNum}</span>` : ''}</div>`;

      const tierOrder = { Epic: 0, Legendary: 1, Mythic: 2 };
      const items = getPossibleItems(c.event, c.picks, c.mainCands, c.rarCands)
        .sort((a, b) => (tierOrder[a.rarity] - tierOrder[b.rarity]) || a.itemName.localeCompare(b.itemName));
      let lastTier = null;
      const itemBtns = items.map(item => {
        const safe = item.itemName.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        const br = item.rarity !== lastTier ? (lastTier !== null ? '<div class="calib-tier-break"></div>' : '') : '';
        lastTier = item.rarity;
        return `${br}<button class="calib-item-btn" data-name="${safe}" data-rar="${item.rarity}" onclick="calibPickItem(this.dataset.name,this.dataset.rar)">${badge(item.rarity)}<span>${item.itemName}</span></button>`;
      }).join('');

      document.getElementById('table-section').innerHTML = `
      <div class="calib-wrap ${th}">
        <div class="calib-title">Find Position — ${c.event === 'main_event' ? 'Breeding' : 'Assault'}</div>
        ${counter}
        <div class="calib-seq">${seqHtml || '<span style="color:var(--text-mid);font-size:16px">Open 10 chests and tap each item you received</span>'}</div>
        <div class="calib-actions">
          <button class="util-btn danger" onclick="hideCalib()">✕ Cancel</button>
          <button class="util-btn"${batchPicks.length > 0 ? '' : ' disabled'} onclick="calibUndo()">↩ Undo last</button>
        </div>
        <div class="calib-items">${itemBtns}</div>
      </div>`;
    }

    function renderCalibResults() {
      const c = ts().calib, th = theme();
      const picks = c.picks;
      const rarCounts = {
        Epic: picks.filter(p => p.rarity === 'Epic').length,
        Legendary: picks.filter(p => p.rarity === 'Legendary').length,
        Mythic: picks.filter(p => p.rarity === 'Mythic').length,
      };
      const advMain = v => ((v - 1 + picks.length) % 100) + 1;
      const advRar = (v, rar) => ((v - 1 + rarCounts[rar]) % maxLen(S.tab, rar)) + 1;

      const mainResolved = c.mainCands?.length === 1;
      const rarities = isPlat() ? ['Epic', 'Legendary', 'Mythic'] : ['Epic', 'Legendary'];
      const rarLabels = { Epic: 'Epic Position', Legendary: 'Legendary Position', Mythic: 'Mythic Position' };
      const rarFields = { Epic: 'epicSel', Legendary: 'legSel', Mythic: 'mythSel' };

      const mainHtml = mainResolved
        ? `<div class="calib-result-val">${advMain(c.mainCands[0])}</div>`
        : `<span style="color:var(--text-mid);font-size:13px">${c.mainCands?.length ?? 100} candidates — open 10 more</span>`;

      const requiredRarities = ['Epic', 'Legendary'];
      const resolvedMap = {};
      let rarHtml = '';
      for (const rar of rarities) {
        const rc = c.rarCands[rar], sel = c.confirmData[rarFields[rar]];
        const optional = rar === 'Mythic';
        if (!rc || rc.length === 0) {
          resolvedMap[rar] = optional;
          rarHtml += `<div class="calib-result-row"><div class="calib-result-label">${rarLabels[rar]}${optional ? ' <span style="color:var(--text-dim);font-size:10px">optional</span>' : ''}</div><span style="color:var(--text-dim);font-size:12px">Not seen yet${optional ? '' : ' — open 10 more'}</span></div>`;
        } else if (rc.length === 1) {
          resolvedMap[rar] = true;
          rarHtml += `<div class="calib-result-row"><div class="calib-result-label">${rarLabels[rar]}</div><div class="calib-result-val">${advRar(rc[0], rar)}</div></div>`;
        } else {
          resolvedMap[rar] = false;
          rarHtml += `<div class="calib-result-row"><div class="calib-result-label">${rarLabels[rar]}${optional ? ' <span style="color:var(--text-dim);font-size:10px">optional</span>' : ''}</div><span style="color:var(--text-dim);font-size:12px">${rc.length} candidates${optional ? '' : ' — open 10 more'}</span></div>`;
        }
      }
      const allRequiredResolved = mainResolved && requiredRarities.every(r => resolvedMap[r]);

      const bonusValid = c.confirmData.bonusSel !== null && c.confirmData.bonusSel !== undefined && !isNaN(c.confirmData.bonusSel) && c.confirmData.bonusSel >= 0 && c.confirmData.bonusSel <= 29;
      let btns = '';
      if (allRequiredResolved) btns += `<button class="calib-confirm-btn"${bonusValid ? '' : ' disabled'} onclick="calibConfirm()">✓ Confirm</button>`;
      if (!allRequiredResolved) btns += `<button class="calib-continue-btn" onclick="calibContinue()">→ Open 10 More</button>`;
      btns += `<button class="util-btn danger" onclick="hideCalib()">✕ Cancel</button>`;

      const picksHtml = picks.map((p, i) => {
        const badgeCls = `badge badge-${p.rarity.toLowerCase()}`;
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,47,96,0.3)">
          <span style="color:var(--text-dim);font-size:11px;font-weight:700;width:18px;text-align:right">${i + 1}</span>
          <span class="${badgeCls}">${p.rarity}</span>
          <span style="font-size:13px;font-weight:600">${p.itemName}</span>
        </div>`;
      }).join('');

      document.getElementById('table-section').innerHTML = `
      <div class="calib-wrap ${th}">
        <div class="calib-title">Picks</div>
        <div style="margin-bottom:16px;max-height:220px;overflow-y:auto">${picksHtml}</div>
        <div class="calib-title">${mainResolved ? 'Results' : 'More Picks Needed'}</div>
        <div class="calib-result-row"><div class="calib-result-label">Main Position</div>${mainHtml}</div>
        ${rarHtml}
        <div class="calib-result-row"><div class="calib-result-label">Bonus Position <span style="color:var(--accent-bright);font-size:10px">required</span></div><input type="number" min="0" max="29" placeholder="0–29" value="${c.confirmData.bonusSel ?? ''}" oninput="selectConfirmCand('bonusSel',parseInt(this.value))" style="background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:16px;font-weight:700;padding:6px 10px;width:90px;outline:none;-moz-appearance:textfield"></div>
        <label style="display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-mid)">
          <input type="checkbox" ${c.confirmData.bonusChest ? 'checked' : ''} onchange="toggleBonusChest(this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--accent-bright)">
          A bonus chest appeared
        </label>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">${btns}</div>
      </div>`;
    }

    // ─── Go ───────────────────────────────────────────────────────────────────
    init();
  </script>
</body>

</html>
